="600" fill="#1a1a1a">Opens everywhere</text><circle cx="1055" cy="355" r="28" fill="#2e9e5b"/><path d="M1042 355 l9 10 l17 -20" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><line x1="0" y1="554" x2="1200" y2="554" stroke="#e5e5e5" stroke-width="1"/>
