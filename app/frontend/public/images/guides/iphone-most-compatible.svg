<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<rect width="1200" height="560" fill="#ffffff"/><rect x="0" y="0" width="1200" height="72" fill="#fafafa"/>
<rect x="40" y="26" width="20" height="20" rx="4" fill="#2962ff"/><text x="70" y="42" font-size="19" font-weight="700" fill="#1a1a1a">openmyheic.com</text>
<text x="1160" y="42" font-size="18" font-weight="600" fill="#6b6b6b" text-anchor="end">iPhone camera format</text><line x1="0" y1="72" x2="1200" y2="72" stroke="#e5e5e5"/><rect x="120" y="110" width="300" height="380" rx="34" fill="#111" /><rect x="130" y="120" width="280" height="360" rx="26" fill="#ffffff"/><rect x="130" y="120" width="280" height="52" rx="26" fill="#fafafa"/><text x="270.0" y="152" font-size="15" font-weight="700" fill="#1a1a1a" text-anchor="middle">Formats</text><text x="148" y="140" font-size="13" fill="#2962ff">‹ Camera</text><text x="148" y="200" font-size="12" font-weight="600" fill="#6b6b6b">CAMERA CAPTURE</text><rect x="138" y="214" width="264" height="52" rx="10" fill="#fafafa" stroke="#2962ff" stroke-width="2"/><text x="154" y="246" font-size="14.5" font-weight="600" fill="#1a1a1a">Most Compatible</text><circle cx="380" cy="240" r="11" fill="#2e9e5b"/><path d="M375 240 l4 4 l6 -8" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="138" y="274" width="264" height="52" rx="10" fill="#ffffff" stroke="#e5e5e5"/><text x="154" y="306" font-size="14.5" fill="#6b6b6b">High Efficiency (HEIC)</text><text x="148" y="362" font-size="12" fill="#6b6b6b">“Most Compatible” saves new</text><text x="148" y="382" font-size="12" fill="#6b6b6b">photos as JPG instead of HEIC.</text><line x1="450" y1="290" x2="526" y2="290" stroke="#2962ff" stroke-width="4" stroke-linecap="round"/><path d="M524 281 l14 9 l-14 9" fill="none" stroke="#2962ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="560" y="150" width="560" height="120" rx="12" fill="#fafafa" stroke="#e5e5e5"/><text x="585" y="192" font-size="15" font-weight="700" fill="#1a1a1a">Settings → Camera → Formats → Most Compatible</text><text x="585" y="225" font-size="13.5" fill="#6b6b6b">New photos save as JPG — open on Windows, Android, and the web.</text><text x="585" y="250" font-size="13.5" fill="#6b6b6b">Already have HEIC photos? Convert them once.</text><rect x="560" y="300" width="560" height="140" rx="12" fill="#ffffff" stroke="#2962ff" stroke-width="1.5"/><text x="585" y="338" font-size="15" font-weight="700" fill="#2962ff">For existing HEIC photos</text><rect x="585" y="356" width="250" height="60" rx="8" fill="#fafafa" stroke="#2962ff" stroke-dasharray="5 4"/><text x="710" y="382" font-size="12.5" fill="#6b6b6b" text-anchor="middle">Drop HEIC at openmyheic.com</text><text x="710" y="402" font-size="12" fill="#6b6b6b" text-anchor="middle">converts on-device · no upload</text><circle cx="905" cy="386" r="24" fill="#2e9e5b"/><path d="M894 386 l8 9 l16 -19" stroke="#fff" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="960" y="380" font-size="14" font-weight="600" fill="#1a1a1a">JPG</text><text x="960" y="400" font-size="12.5" fill="#6b6b6b">opens anywhere</text><line x1="0" y1="514" x2="1200" y2="514" stroke="#e5e5e5"/><text x="40" y="540" font-size="14" fill="#6b6b6b">Free to share — please credit with a link to openmyheic.com</text><text x="1160" y="540" font-size="14" font-weight="600" fill="#2962ff" text-anchor="end">openmyheic.com</text></svg>